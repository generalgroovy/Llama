experiment_id: exp_01_baseline
name: Baseline navigation reliability
description: UserLM cooperates with the deterministic RuleAgent on simple maps.
maps_path: configs/tasks/navigation_maps.yaml
system_profile: low
speech_pipeline:
  asr:
    enabled: false
    word_error_rate: 0.0
  nlu:
    enabled: true
    confidence: 1.0
  dialog_management:
    enabled: true
  nlg:
    enabled: true
  tts:
    enabled: false
    sample_rate: 16000
  record_audio: true
  audio_dir: data/audio
knowledge_split:
  agent_a:
    knows_goal: true
    knows_constraints: true
    knows_network: false
  agent_b:
    knows_goal_initially: false
    knows_constraints_initially: false
    knows_network: true
agent_a: userlm
agent_b: rule
max_turns: 20
max_invalid_moves: 3
parameter_grid:
  agent_b: [rule]
  map_complexity: [simple]
  ambiguity_level: [0.0]
  language_noise: [0.0]
  memory_context_limit: [full]
  prompt_strategy: [direct]
  constraint_type: [avoid_blocked]
  seed: [1, 2, 3]
