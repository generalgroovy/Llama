experiment_id: exp_01_baseline
name: Baseline navigation reliability
description: UserLM cooperates with the deterministic RuleAgent on simple maps.
maps_path: configs/tasks/navigation_maps.yaml
system_profile: low
prompt_policy:
  avoid_repetition: true
  agent_b_response_style: compact
  route_strategy: shortest_path_first
speech_pipeline:
  asr:
    enabled: false
    backend: transcript_sidecar
    word_error_rate: 0.0
    require_audio: false
  nlu:
    enabled: true
    confidence: 1.0
  dialog_management:
    enabled: true
  nlg:
    enabled: true
  tts:
    enabled: false
    backend: synthetic_wave
    sample_rate: 16000
    voice: synthetic-dialogue
    speech_rate_wpm: 185
    min_duration_seconds: 0.55
    max_duration_seconds: 3.5
    write_transcript_sidecar: true
  measure_latency: false
  record_audio: true
  audio_dir: data/audio
knowledge_split:
  agent_a:
    knows_goal: true
    knows_constraints: true
    knows_network: false
  agent_b:
    knows_goal_initially: false
    knows_constraints_initially: false
    knows_network: true
agent_a: userlm
agent_b: rule
max_turns: 20
max_invalid_moves: 3
parameter_grid:
  agent_b: [rule]
  map_complexity: [simple]
  ambiguity_level: [0.0]
  language_noise: [0.0]
  memory_context_limit: [full]
  prompt_strategy: [direct]
  constraint_type: [avoid_blocked]
  start_time: ["08:00"]
  seed: [1, 2, 3]
