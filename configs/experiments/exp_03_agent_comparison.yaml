experiment_id: exp_03_agent_comparison
name: Agent B comparison
description: Compare deterministic RuleAgent with the ChatGPTAgent placeholder adapter.
maps_path: configs/tasks/navigation_maps.yaml
system_profile: low
prompt_policy:
  avoid_repetition: true
  agent_b_response_style: compact
  route_strategy: shortest_path_first
speech_pipeline:
  asr:
    enabled: false
    word_error_rate: 0.0
  nlu:
    enabled: true
    confidence: 1.0
  dialog_management:
    enabled: true
  nlg:
    enabled: true
  tts:
    enabled: false
    sample_rate: 16000
  record_audio: true
  audio_dir: data/audio
knowledge_split:
  agent_a:
    knows_goal: true
    knows_constraints: true
    knows_network: false
  agent_b:
    knows_goal_initially: false
    knows_constraints_initially: false
    knows_network: true
agent_a: userlm
max_turns: 24
max_invalid_moves: 4
parameter_grid:
  agent_b: [rule, chatgpt]
  map_complexity: [simple, complex]
  ambiguity_level: [0.0, 0.2]
  language_noise: [0.0]
  memory_context_limit: [full, short]
  prompt_strategy: [direct]
  constraint_type: [avoid_blocked]
  network_change: [none]
  seed: [1, 2]
